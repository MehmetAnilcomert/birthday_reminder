name: birthday_reminder
description: "Birthday Reminder App with Firebase"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  
  # Firebase
  firebase_core: ^3.10.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_messaging: ^15.1.7
  flutter_local_notifications: ^18.0.1
  
  # Local Storage
  shared_preferences: ^2.3.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Network & Utilities
  dio: ^5.7.0
  connectivity_plus: ^6.1.1
  
  # UI & Navigation
  auto_route: ^9.2.3
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  lottie: ^3.3.2
  easy_localization: ^3.0.8

  # Core dependencies
  kartal: ^4.2.0
  vexana: ^5.0.3
  easy_logger: ^0.0.2
  logger: ^2.0.0
  envied: ^1.3.2
  
  # Date Handling
  jiffy: ^6.3.1
  
  # Encryption & Security
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  
  # Functional
  dartz: ^0.10.1
  
  # Service Locator
  get_it: ^8.0.3
  injectable: ^2.5.0
  
  # Json Serialization
  json_annotation: ^4.9.0
  
  very_good_analysis: ^10.1.0
  
  # modules
  common: 
    path: module/common
  url_launcher: ^6.3.2

  
  # 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  envied_generator: any
  auto_route_generator: any
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/translations/