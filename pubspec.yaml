name: birthday_reminder
description: "Birthday Reminder App with Firebase"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  
  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_messaging: ^16.1.1
  flutter_local_notifications: ^20.0.0
  firebase_ai: ^3.0.0
  
  # Local Storage
  shared_preferences: ^2.5.2
  
  # Network & Utilities
  dio: ^5.7.0
  connectivity_plus: ^7.0.0
  
  # UI & Navigation
  auto_route: ^9.2.3
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  lottie: ^3.3.2
  easy_localization: ^3.0.8
  tutorial_coach_mark: ^1.3.3


  # Core dependencies
  kartal: ^4.2.0
  vexana: ^5.0.3
  easy_logger: ^0.0.2
  logger: ^2.0.0
  envied: ^1.3.2
  
  # Date Handling
  jiffy: ^6.3.1
  
  # Encryption & Security
  encrypt: ^5.0.3
  flutter_secure_storage: ^10.0.0
  crypto: ^3.0.3
  
  # Functional
  dartz: ^0.10.1
  
  # Service Locator
  get_it: ^9.2.0
  injectable: ^2.5.0
  
  # Json Serialization
  json_annotation: ^4.9.0

  url_launcher: ^6.3.2
  
  very_good_analysis: ^10.1.0
  
  # modules
  common: 
    path: module/common
  core:
    path: module/core
 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  envied_generator: any
  auto_route_generator: any

flutter:
  uses-material-design: true
  
  assets:
    - assets/translations/